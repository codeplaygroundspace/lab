<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Acquisition Login</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>

  <div class="card">
    <!-- Left Panel -->
    <div class="left-panel">
      <video class="mosaic-bg" autoplay muted loop playsinline poster="hero-bg.png">
        <source src="green-squares-anima.mp4" type="video/mp4">
      </video>

      <div class="left-content">
        <div class="logo">
          <div class="logo-icon">
            <span></span><span></span><span></span>
            <span></span><span></span><span></span>
            <span></span><span></span><span></span>
          </div>
        </div>

        <div class="left-text">
          <h1>Access Approved Acquisition <em>Opportunities</em></h1>
          <p>Confidential Shopify brands priced based on real seller intent and verified performance.</p>
        </div>
      </div>
    </div>

    <!-- Right Panel -->
    <div class="right-panel">
      <div class="login-logo">
        <span></span><span></span><span></span>
        <span></span><span></span><span></span>
        <span></span><span></span><span></span>
      </div>

      <h2>Welcome Back!</h2>
      <p class="subtitle">Login to Your Account</p>

      <form class="login-form" onsubmit="return false;">
        <input type="email" placeholder="eg. johndoe@gmail.com" autocomplete="email">
        <input type="password" placeholder="password" autocomplete="current-password">
        <button type="submit" class="btn-signin">Sign In</button>
      </form>

      <p class="signup-text">Don't have an account <a href="#">sign up</a></p>
    </div>

    <div class="footer">
      <a href="#">Privacy policy</a>
      <a href="#">Terms &amp; conditions</a>
    </div>
  </div>



</body>
</html>
